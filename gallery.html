<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Ayu International Hotel</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="header"></div>

    <section class="page-header">
        <div class="container">
            <h1>Photo Gallery</h1>
            <p>Explore our beautiful hotel through images</p>
        </div>
    </section>

    <section class="gallery-filters container">
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="rooms">Rooms</button>
            <button class="filter-btn" data-filter="dining">Dining</button>
            <button class="filter-btn" data-filter="facilities">Facilities</button>
            <button class="filter-btn" data-filter="events">Events</button>
        </div>
    </section>

    <section class="gallery-section container">
        <div class="gallery-grid" id="gallery-grid">
            <!-- Gallery items will be loaded here -->
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div id="caption"></div>
    </div>

    <div id="footer"></div>

    <script>
        fetch('includes/header.html').then(r=>r.text()).then(d=>{
            document.getElementById('header').innerHTML=d;
            if (typeof initMobileMenu === 'function') {
                initMobileMenu();
            }
        });
        fetch('includes/footer.html').then(r=>r.text()).then(d=>document.getElementById('footer').innerHTML=d);
        
        // Gallery data
        const galleryItems = [
            { category: 'rooms', img: 'assets/images/gallery/rooms-gallery/room-1.jpg', title: 'Deluxe Room' },
            { category: 'rooms', img: 'assets/images/gallery/rooms-gallery/room-2.jpg', title: 'Executive Suite' },
            { category: 'dining', img: 'assets/images/dining/restaurant.jpg', title: 'Main Restaurant' },
            { category: 'facilities', img: 'assets/images/facilities/pool.jpg', title: 'Swimming Pool' },
            { category: 'facilities', img: 'assets/images/facilities/gym.jpg', title: 'Fitness Center' },
            { category: 'events', img: 'assets/images/events/wedding.jpg', title: 'Wedding Setup' },
            { category: 'dining', img: 'assets/images/dining/coffee-ceremony.jpg', title: 'Coffee Ceremony' },
            { category: 'rooms', img: 'assets/images/gallery/rooms-gallery/room-3.jpg', title: 'Family Room' }
        ];
        
        // Load gallery
        function loadGallery(filter = 'all') {
            const galleryGrid = document.getElementById('gallery-grid');
            const filtered = filter === 'all' ? galleryItems : galleryItems.filter(item => item.category === filter);
            
            galleryGrid.innerHTML = filtered.map(item => `
                <div class="gallery-item" data-category="${item.category}">
                    <img src="${item.img}" alt="${item.title}" loading="lazy">
                    <div class="gallery-overlay">
                        <span>${item.title}</span>
                        <i class="fas fa-search-plus"></i>
                    </div>
                </div>
            `).join('');
            
            // Add lightbox functionality
            document.querySelectorAll('.gallery-item').forEach(item => {
                item.addEventListener('click', function() {
                    const img = this.querySelector('img').src;
                    const title = this.querySelector('.gallery-overlay span').textContent;
                    openLightbox(img, title);
                });
            });
        }
        
        // Lightbox functions
        function openLightbox(imgSrc, title) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const caption = document.getElementById('caption');
            
            lightbox.style.display = 'block';
            lightboxImg.src = imgSrc;
            caption.innerHTML = title;
        }
        
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
        
        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const filter = this.getAttribute('data-filter');
                loadGallery(filter);
            });
        });
        
        // Close lightbox
        document.querySelector('.close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
        
        // Load initial gallery
        loadGallery();
    </script>

    <style>
        .gallery-filters {
            padding: 20px 0;
            text-align: center;
        }
        
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 25px;
            background: var(--bg-light);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 16px;
        }
        
        .filter-btn.active,
        .filter-btn:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px 0;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: var(--border-radius);
            cursor: pointer;
            height: 250px;
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
            color: white;
        }
        
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }
        
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        
        .gallery-overlay span {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .gallery-overlay i {
            font-size: 30px;
        }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        
        .lightbox-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #caption {
            margin: auto;
            display: block;
            width: 80%;
            text-align: center;
            color: white;
            padding: 10px 0;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
    <script src="assets/js/main.js"></script>
</body>
</html>
