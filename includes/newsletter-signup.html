<section class="newsletter-section">
    <div class="container">
        <div class="newsletter-content">
            <h2>Stay Updated</h2>
            <p>Subscribe to our newsletter for exclusive offers, travel tips, and the latest news from Ayu Hotel.</p>
            <form id="newsletter-form" class="newsletter-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email Address" required>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="privacy-consent" name="privacy-consent" required>
                    <label for="privacy-consent">I agree to receive marketing emails and accept the privacy policy</label>
                </div>
                <button type="submit" class="btn btn-primary">Subscribe</button>
            </form>
            <p class="newsletter-note">We respect your privacy. Unsubscribe at any time.</p>
        </div>
    </div>
</section>
