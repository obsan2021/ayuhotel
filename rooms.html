<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms & Suites - Ayu International Hotel</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="header"></div>

    <section class="page-header">
        <div class="container">
            <h1>Our Rooms & Suites</h1>
            <p>Luxurious accommodations designed for your comfort</p>
        </div>
    </section>

    <section class="rooms-list container">
        <div id="all-rooms" class="rooms-grid"></div>
    </section>

    <div id="footer"></div>

    <script>
        fetch('includes/header.html')
            .then(r => r.text())
            .then(d => {
                document.getElementById('header').innerHTML = d;
                if (typeof initMobileMenu === 'function') {
                    initMobileMenu();
                }
            });
        fetch('includes/footer.html')
            .then(r => r.text())
            .then(d => document.getElementById('footer').innerHTML = d);
        
        fetch('data/rooms.json')
            .then(r => r.json())
            .then(data => {
                const roomsContainer = document.getElementById('all-rooms');
                roomsContainer.innerHTML = data.rooms.map(room => `
                    <div class="room-detail-card">
                        <div class="room-image">
                            <img src="${room.images[0]}" alt="${room.name}">
                        </div>
                        <div class="room-details">
                            <h2>${room.name}</h2>
                            <div class="room-meta">
                                <span><i class="fas fa-expand"></i> ${room.size}</span>
                                <span><i class="fas fa-bed"></i> ${room.bed}</span>
                                <span><i class="fas fa-users"></i> Max ${room.max_guests} guests</span>
                                <span><i class="fas fa-eye"></i> ${room.view}</span>
                            </div>
                            <p>${room.description}</p>
                            <h4>Amenities:</h4>
                            <ul class="amenities-list">
                                ${room.amenities.map(amenity => `<li><i class="fas fa-check"></i> ${amenity}</li>`).join('')}
                            </ul>
                            <div class="room-price">$${room.price} <span>/ night</span></div>
                            <a href="booking.html?room=${room.id}" class="btn-primary">Book This Room</a>
                        </div>
                    </div>
                `).join('');
            });
    </script>
    <style>
        .page-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 120px 0 60px;
            text-align: center;
            margin-top: 80px;
        }
        .room-detail-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--box-shadow);
            margin-bottom: 40px;
            padding: 20px;
        }
        .room-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--border-radius);
        }
        .room-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 20px 0;
        }
        .room-meta span i {
            margin-right: 5px;
            color: var(--primary-color);
        }
        .amenities-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            list-style: none;
            margin: 20px 0;
        }
        .amenities-list li i {
            color: var(--success);
            margin-right: 10px;
        }
        @media (max-width: 768px) {
            .room-detail-card {
                grid-template-columns: 1fr;
            }
        }
    </style>
</body>
</html>
